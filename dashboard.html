<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baita — My Space</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --olive:#6B7535;--olive-light:#8FA048;
  --cream:#F5F0E8;--cream2:#EDE8DC;--cream3:#D8D2C4;
  --white:#FDFAF5;--text:#1A1A10;--text-muted:#8A8A72;
}
html,body{height:100%;-webkit-font-smoothing:antialiased}
body{font-family:'Jost',sans-serif;font-weight:300;background:var(--cream);color:var(--text);min-height:100vh;opacity:1;transition:opacity .3s}
body.out{opacity:0}

/* ── NAV ── */
nav{
  position:sticky;top:0;z-index:100;
  background:rgba(245,240,232,0.92);backdrop-filter:blur(20px);
  border-bottom:0.5px solid var(--cream3);
  padding:0 40px;height:68px;
  display:flex;align-items:center;justify-content:space-between;gap:20px
}
.logo-wrap{display:flex;align-items:center;gap:10px;cursor:pointer;text-decoration:none}
.logo-img{width:34px;height:34px;object-fit:contain}
.logo-text{font-family:'Cormorant Garamond',serif;font-size:22px;letter-spacing:0.14em;color:var(--text)}

/* ── SEARCH PILL ── */
.search-pill{
  flex:1;max-width:620px;
  display:flex;align-items:center;
  background:var(--white);
  border-radius:60px;
  border:0.5px solid var(--cream3);
  box-shadow:0 2px 12px rgba(0,0,0,0.06);
  padding:6px 6px 6px 24px;
  transition:box-shadow .2s
}
.search-pill:focus-within{box-shadow:0 4px 24px rgba(107,117,53,0.12)}
.sp-field{flex:1;min-width:0;cursor:text}
.sp-label{display:block;font-size:9px;letter-spacing:0.2em;text-transform:uppercase;color:var(--olive);margin-bottom:3px}
.sp-input{
  width:100%;font-family:'Jost',sans-serif;font-size:13px;font-weight:300;
  color:var(--text);background:transparent;border:none;outline:none;padding:0
}
.sp-input::placeholder{color:var(--cream3)}
.sp-sep{width:0.5px;height:28px;background:var(--cream3);flex-shrink:0;margin:0 12px}
.sp-btn{
  width:44px;height:44px;border-radius:50%;
  background:var(--olive);border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  color:white;flex-shrink:0;transition:background .2s
}
.sp-btn:hover{background:var(--olive-light)}
.sp-btn svg{width:17px;height:17px;stroke:white;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

/* nav right */
.nav-right{display:flex;align-items:center;gap:10px;flex-shrink:0}
.nav-btn{
  font-family:'Jost',sans-serif;font-size:10px;letter-spacing:0.14em;
  text-transform:uppercase;padding:9px 18px;cursor:pointer;
  transition:all .2s;background:transparent;
  border:0.5px solid var(--cream3);color:var(--text-muted);border-radius:40px
}
.nav-btn:hover{border-color:var(--olive);color:var(--olive)}
.nav-btn.solid{background:var(--olive);color:white;border-color:var(--olive)}
.nav-btn.solid:hover{background:var(--olive-light)}
.nav-user{
  display:flex;align-items:center;gap:8px;cursor:pointer;
  border:0.5px solid var(--cream3);border-radius:40px;
  padding:6px 14px 6px 8px;transition:border-color .2s;background:var(--white)
}
.nav-user:hover{border-color:var(--olive)}
.nav-av{
  width:28px;height:28px;border-radius:50%;
  background:var(--cream2);overflow:hidden;
  display:flex;align-items:center;justify-content:center;flex-shrink:0
}
.nav-av img,.nav-av svg{width:100%;height:100%;object-fit:cover}
.nav-uname{font-size:11px;color:var(--text);font-weight:400}

/* ── FILTERS BAR ── */
.filters-bar{
  padding:16px 40px;
  display:flex;align-items:center;gap:8px;
  border-bottom:0.5px solid var(--cream3);
  background:var(--white);overflow-x:auto
}
.filters-bar::-webkit-scrollbar{display:none}
.fb{
  font-family:'Jost',sans-serif;font-size:10px;letter-spacing:0.12em;
  text-transform:uppercase;padding:8px 18px;
  border:0.5px solid var(--cream3);color:var(--text-muted);
  background:transparent;cursor:pointer;transition:all .18s;
  white-space:nowrap;border-radius:40px
}
.fb:hover{border-color:var(--olive);color:var(--olive)}
.fb.on{background:var(--olive);color:white;border-color:var(--olive)}
.fb-sort{
  font-family:'Jost',sans-serif;font-size:10px;
  background:transparent;border:0.5px solid var(--cream3);
  color:var(--text-muted);padding:8px 14px;cursor:pointer;
  outline:none;border-radius:40px;margin-left:auto
}

/* ── GRID ── */
.grid-wrap{padding:32px 40px 60px}
.grid-title{
  font-family:'Cormorant Garamond',serif;
  font-size:32px;font-weight:300;
  color:var(--text);margin-bottom:6px
}
.grid-count{
  font-size:11px;letter-spacing:0.14em;text-transform:uppercase;
  color:var(--text-muted);margin-bottom:24px
}
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
  gap:24px
}

/* ── CARD ── */
.card{
  background:var(--white);border-radius:16px;overflow:hidden;
  cursor:pointer;border:0.5px solid var(--cream3);
  transition:transform .25s,box-shadow .25s
}
.card:hover{transform:translateY(-4px);box-shadow:0 16px 48px rgba(107,117,53,0.1)}
.card-img{width:100%;aspect-ratio:4/3;position:relative;overflow:hidden}
.card-grad{position:absolute;inset:0;transition:transform .6s}
.card:hover .card-grad{transform:scale(1.04)}
.card-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,0.4) 0%,transparent 55%)}
.card-src{
  position:absolute;top:12px;left:12px;
  background:rgba(253,250,245,0.92);backdrop-filter:blur(8px);
  font-size:8px;letter-spacing:0.16em;text-transform:uppercase;
  color:var(--olive);padding:4px 10px;border-radius:20px;
  border:0.5px solid rgba(107,117,53,0.2)
}
.card-heart{
  position:absolute;top:10px;right:10px;
  width:32px;height:32px;border-radius:50%;
  background:rgba(253,250,245,0.92);backdrop-filter:blur(8px);
  border:0.5px solid var(--cream3);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all .2s;color:var(--text-muted)
}
.card-heart:hover,.card-heart.on{color:var(--olive);background:white;border-color:var(--olive)}
.card-heart.on svg{fill:var(--olive);stroke:var(--olive)}
.card-heart svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2}
.card-price{
  position:absolute;bottom:12px;left:12px;
  font-family:'Cormorant Garamond',serif;font-size:20px;color:white
}
.card-price span{font-family:'Jost',sans-serif;font-size:9px;letter-spacing:0.1em;text-transform:uppercase;color:rgba(255,255,255,0.6);margin-left:4px}
.card-new{position:absolute;bottom:12px;right:12px;font-size:7px;letter-spacing:0.16em;text-transform:uppercase;background:var(--olive);color:white;padding:3px 9px;border-radius:20px}
.card-body{padding:14px 16px 18px}
.card-hood{font-size:9px;letter-spacing:0.2em;text-transform:uppercase;color:var(--olive);margin-bottom:5px}
.card-title{font-family:'Cormorant Garamond',serif;font-size:19px;color:var(--text);margin-bottom:8px;line-height:1.2}
.card-details{display:flex;gap:12px;font-size:11px;color:var(--text-muted)}

/* ── DETAIL MODAL ── */
#modal-overlay{
  position:fixed;inset:0;background:rgba(26,26,16,0.6);
  backdrop-filter:blur(8px);z-index:500;
  display:none;align-items:center;justify-content:center;padding:24px
}
#modal-overlay.open{display:flex}
.detail-modal{
  background:var(--white);border-radius:20px;
  width:100%;max-width:560px;overflow:hidden;
  animation:modalIn .3s cubic-bezier(.34,1.2,.64,1)
}
.dm-img{width:100%;height:260px;position:relative;overflow:hidden}
.dm-grad{position:absolute;inset:0}
.dm-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,0.5),transparent 55%)}
.dm-close{
  position:absolute;top:14px;right:14px;
  width:30px;height:30px;background:rgba(253,250,245,0.9);
  border-radius:50%;border:none;cursor:pointer;
  font-size:14px;color:var(--text-muted);
  display:flex;align-items:center;justify-content:center;z-index:2
}
.dm-price{
  position:absolute;bottom:16px;left:20px;
  font-family:'Cormorant Garamond',serif;font-size:28px;color:white
}
.dm-price span{font-family:'Jost',sans-serif;font-size:9px;letter-spacing:0.12em;text-transform:uppercase;color:rgba(255,255,255,0.6);margin-left:6px}
.dm-body{padding:24px}
.dm-hood{font-size:9px;letter-spacing:0.22em;text-transform:uppercase;color:var(--olive);margin-bottom:7px}
.dm-title{font-family:'Cormorant Garamond',serif;font-size:26px;color:var(--text);margin-bottom:16px;line-height:1.2}
.dm-specs{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--cream3);margin-bottom:18px}
.dm-spec{padding:12px;background:var(--cream);text-align:center}
.dm-spec-val{font-family:'Cormorant Garamond',serif;font-size:22px;color:var(--text);margin-bottom:2px}
.dm-spec-lbl{font-size:8px;letter-spacing:0.14em;text-transform:uppercase;color:var(--text-muted)}
.dm-desc{font-size:13px;color:var(--text-muted);line-height:1.8;margin-bottom:18px}
.dm-actions{display:flex;gap:10px}
.dm-btn{
  flex:1;font-family:'Jost',sans-serif;font-size:10px;
  letter-spacing:0.18em;text-transform:uppercase;
  padding:14px;border:none;cursor:pointer;
  transition:all .2s;border-radius:40px
}
.dm-btn.primary{background:var(--olive);color:white}
.dm-btn.primary:hover{background:var(--olive-light)}
.dm-btn.ghost{background:transparent;color:var(--text-muted);border:0.5px solid var(--cream3)}
.dm-btn.ghost:hover{border-color:var(--olive);color:var(--olive)}

/* ── PROFILE MODAL ── */
.profile-modal{
  background:var(--white);border-radius:20px;
  width:100%;max-width:480px;overflow:hidden;
  max-height:90vh;overflow-y:auto;
  animation:modalIn .3s cubic-bezier(.34,1.2,.64,1)
}
.profile-modal::-webkit-scrollbar{width:3px}
.profile-modal::-webkit-scrollbar-thumb{background:var(--cream3)}
.pm-header{
  padding:28px 28px 20px;
  border-bottom:0.5px solid var(--cream3);
  display:flex;align-items:center;gap:18px;
  position:relative
}
.pm-close{
  position:absolute;top:14px;right:14px;
  width:28px;height:28px;background:var(--cream2);
  border-radius:50%;border:none;cursor:pointer;
  font-size:13px;color:var(--text-muted);
  display:flex;align-items:center;justify-content:center
}
.pm-av{
  width:68px;height:68px;border-radius:50%;
  background:var(--cream2);overflow:hidden;
  border:0.5px solid var(--cream3);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;position:relative;cursor:pointer
}
.pm-av img{width:100%;height:100%;object-fit:cover;display:none}
.pm-av svg{width:100%;height:100%}
.pm-av-upload{position:absolute;inset:0;opacity:0;cursor:pointer;border-radius:50%;width:100%;height:100%}
.pm-info{flex:1}
.pm-badge{width:36px;height:36px;margin-bottom:4px}
.pm-role{font-size:9px;letter-spacing:0.22em;text-transform:uppercase;color:var(--olive);margin-bottom:3px}
.pm-name{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:300;color:var(--text)}
.pm-email{font-size:11px;color:var(--text-muted)}
.pm-body{padding:20px 28px}
.pm-section{font-size:9px;letter-spacing:0.24em;text-transform:uppercase;color:var(--text-muted);margin:20px 0 12px;display:flex;align-items:center;gap:10px}
.pm-section::after{content:'';flex:1;height:0.5px;background:var(--cream3)}
.pm-fields{display:grid;grid-template-columns:1fr 1fr;gap:16px 24px}
.pm-field label{font-size:8px;letter-spacing:0.24em;text-transform:uppercase;color:var(--olive);display:block;margin-bottom:7px}
.pm-input{width:100%;font-family:'Jost',sans-serif;font-size:13px;font-weight:300;color:var(--text);background:transparent;border:none;border-bottom:0.5px solid var(--cream3);outline:none;padding:6px 0 8px;transition:border-color .2s}
.pm-input:focus{border-bottom-color:var(--olive)}
.pm-input[readonly]{color:var(--text-muted);cursor:default}
.pm-input::placeholder{color:var(--cream3)}
.nbhd-wrap{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px}
.nc{font-size:10px;letter-spacing:0.06em;padding:6px 13px;border:0.5px solid var(--cream3);color:var(--text-muted);cursor:pointer;transition:all .15s;border-radius:40px}
.nc:hover{border-color:var(--olive);color:var(--olive)}
.nc.on{background:var(--olive);color:white;border-color:var(--olive)}
.pm-footer{padding:16px 28px 24px;display:flex;gap:10px;border-top:0.5px solid var(--cream3)}
.pm-save{
  flex:1;background:var(--olive);color:white;
  font-family:'Jost',sans-serif;font-size:10px;letter-spacing:0.2em;text-transform:uppercase;
  padding:13px;border:none;cursor:pointer;transition:background .2s;border-radius:40px
}
.pm-save:hover{background:var(--olive-light)}
.pm-out{
  font-family:'Jost',sans-serif;font-size:10px;letter-spacing:0.16em;text-transform:uppercase;
  background:transparent;color:var(--text-muted);border:0.5px solid var(--cream3);
  padding:13px 20px;cursor:pointer;transition:all .2s;border-radius:40px
}
.pm-out:hover{border-color:var(--text-muted);color:var(--text)}
.pm-saved-ok{font-size:11px;color:var(--olive);display:none;align-self:center}

/* ── LOGIN MODAL ── */
.login-modal{
  background:var(--white);border-radius:20px;
  width:100%;max-width:400px;padding:40px;
  animation:modalIn .3s cubic-bezier(.34,1.2,.64,1)
}
.lm-title{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:300;color:var(--text);margin-bottom:6px}
.lm-sub{font-size:12px;color:var(--text-muted);margin-bottom:28px;line-height:1.6}
.lm-field{margin-bottom:18px}
.lm-field label{font-size:8px;letter-spacing:0.26em;text-transform:uppercase;color:var(--olive);display:block;margin-bottom:8px}
.lm-field input{width:100%;font-family:'Jost',sans-serif;font-size:14px;padding:10px 0;border:none;border-bottom:0.5px solid var(--cream3);background:transparent;outline:none;color:var(--text);transition:border-color .2s}
.lm-field input:focus{border-bottom-color:var(--olive)}
.lm-field input::placeholder{color:var(--cream3)}
.lm-btn{width:100%;background:var(--olive);color:white;font-family:'Jost',sans-serif;font-size:10px;letter-spacing:0.22em;text-transform:uppercase;padding:15px;border:none;cursor:pointer;border-radius:40px;transition:background .2s;margin-top:4px}
.lm-btn:hover{background:var(--olive-light)}
.lm-err{font-size:11px;color:#c0392b;margin-top:10px;display:none}
.lm-foot{font-size:11px;color:var(--text-muted);text-align:center;margin-top:14px}
.lm-foot a{color:var(--olive);text-decoration:none}

/* ── LOAD MORE ── */
.load-more-wrap{text-align:center;padding:0 0 40px}
.load-more-btn{
  font-family:'Jost',sans-serif;font-size:10px;letter-spacing:0.18em;text-transform:uppercase;
  background:transparent;border:0.5px solid var(--cream3);color:var(--text-muted);
  padding:12px 28px;cursor:pointer;transition:all .2s;border-radius:40px
}
.load-more-btn:hover{border-color:var(--olive);color:var(--olive)}

@keyframes modalIn{from{opacity:0;transform:scale(0.95) translateY(12px)}to{opacity:1;transform:none}}

@media(max-width:768px){
  nav{padding:0 16px;gap:10px}
  .search-pill{max-width:none}
  .sp-sep:first-of-type,.sp-field:nth-child(3){display:none}
  .filters-bar{padding:12px 16px}
  .grid-wrap{padding:20px 16px 40px}
  .grid{grid-template-columns:1fr 1fr;gap:14px}
  .pm-fields{grid-template-columns:1fr}
}
@media(max-width:480px){
  .grid{grid-template-columns:1fr}
  .nav-btn:not(.solid){display:none}
}
</style>
</head>

<script>
var API = 'https://baita.onrender.com';
var token = localStorage.getItem('baita_token');
var myData = null;
var savedIds = new Set(JSON.parse(localStorage.getItem('b_saved') || '[]'));
var offset = 0, curFilter = null, curSort = 'newest', newOnly = false;
var activeModal = null;
var activeListing = null;
var userChips = [];
var HOST_SVG = '<svg width="100%" viewBox="0 0 260 260" xmlns="http://www.w3.org/2000/svg">  <circle cx="130" cy="130" r="128" fill="#6B7535"/>  <circle cx="130" cy="130" r="108" fill="#F5F0E8"/>  <circle cx="130" cy="130" r="114" fill="none" stroke="#F5F0E8" stroke-width="0.5"/>  <polygon points="130,68 78,116 182,116" fill="#6B7535"/>  <rect x="90" y="116" width="80" height="58" fill="#6B7535"/>  <rect x="117" y="142" width="26" height="32" rx="13" fill="#F5F0E8"/>  <rect x="97" y="126" width="14" height="14" rx="2" fill="#F5F0E8"/>  <rect x="149" y="126" width="14" height="14" rx="2" fill="#F5F0E8"/>  <circle cx="130" cy="68" r="4" fill="#F5F0E8"/>  <line x1="70" y1="186" x2="190" y2="186" stroke="#D8D2C4" stroke-width="0.5"/>  <text x="130" y="214" text-anchor="middle" font-family="Cormorant Garamond,Georgia,serif" font-size="30" font-weight="400" fill="#1A1A10" letter-spacing="2">host</text></svg>';
var SEEKER_SVG = '<svg width="100%" viewBox="0 0 260 260" xmlns="http://www.w3.org/2000/svg">  <circle cx="130" cy="130" r="128" fill="#6B7535"/>  <circle cx="130" cy="130" r="108" fill="#F5F0E8"/>  <circle cx="130" cy="130" r="114" fill="none" stroke="#F5F0E8" stroke-width="0.5"/>  <circle cx="124" cy="114" r="44" fill="#6B7535"/>  <circle cx="124" cy="114" r="30" fill="#F5F0E8"/>  <line x1="124" y1="84" x2="124" y2="144" stroke="#6B7535" stroke-width="1" opacity="0.4"/>  <line x1="94" y1="114" x2="154" y2="114" stroke="#6B7535" stroke-width="1" opacity="0.4"/>  <circle cx="124" cy="114" r="5" fill="#6B7535"/>  <line x1="160" y1="148" x2="182" y2="170" stroke="#6B7535" stroke-width="10" stroke-linecap="round"/>  <line x1="160" y1="148" x2="182" y2="170" stroke="#8FA048" stroke-width="3" stroke-linecap="round"/>  <line x1="70" y1="186" x2="190" y2="186" stroke="#D8D2C4" stroke-width="0.5"/>  <text x="130" y="214" text-anchor="middle" font-family="Cormorant Garamond,Georgia,serif" font-size="30" font-weight="400" fill="#1A1A10" letter-spacing="2">seeker</text></svg>';
var GRADS = ["linear-gradient(160deg,#1a2a14,#2d4020)", "linear-gradient(160deg,#0d1520,#1a2535)", "linear-gradient(160deg,#201408,#352010)", "linear-gradient(160deg,#0a1a20,#152835)", "linear-gradient(160deg,#1a1408,#2a2010)", "linear-gradient(160deg,#0a2014,#102820)"];
var NBHD = ["Neve Tzedek","Florentin","Rothschild","Gordon","Kerem HaTeimanim","Lev Tel Aviv","Dizengoff","Ramat Aviv","Jaffa","Sarona","HaCarmel","Shapira","Kikar HaMedina","Old North","Bavli","Tzahala","Ajami","Noga","Yad Eliyahu","Montefiore"];

function navigate(url) {
  document.body.classList.add('out');
  setTimeout(function() { window.location.href = url; }, 280);
}

/* ── MODAL ── */
function openModal(which, listing, idx) {
  var overlay = document.getElementById('modal-overlay');
  document.getElementById('modal-detail').style.display = 'none';
  document.getElementById('modal-login').style.display = 'none';
  document.getElementById('modal-profile').style.display = 'none';
  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';
  if (which === 'detail') {
    activeListing = {listing: listing, idx: idx};
    fillDetail(listing, idx);
    document.getElementById('modal-detail').style.display = 'block';
  } else if (which === 'login') {
    document.getElementById('modal-login').style.display = 'block';
  } else if (which === 'profile') {
    document.getElementById('modal-profile').style.display = 'block';
  }
  activeModal = which;
}
function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  document.body.style.overflow = '';
  activeModal = null;
}

/* ── DETAIL ── */
function fillDetail(l, idx) {
  document.getElementById('dm-grad').style.background = GRADS[idx % GRADS.length];
  document.getElementById('dm-price').textContent = Number(l.price).toLocaleString();
  document.getElementById('dm-hood').textContent = l.neighborhood;
  document.getElementById('dm-title').textContent = l.title;
  document.getElementById('dm-rooms').textContent = l.rooms;
  document.getElementById('dm-sqm').textContent = l.sqm || '—';
  document.getElementById('dm-floor').textContent = l.floor || '—';
  document.getElementById('dm-desc').textContent = l.description || ('Beautiful apartment in ' + l.neighborhood + ', Tel Aviv.');
  var sb = document.getElementById('dm-save');
  sb.innerHTML = savedIds.has(l.id) ? '&#9829; Saved' : '&#9825; Save';
  sb.onclick = function() { toggleSave(l.id); sb.innerHTML = savedIds.has(l.id) ? '&#9829; Saved' : '&#9825; Save'; };
  document.getElementById('dm-contact').onclick = function() {
    if (!token) { closeModal(); setTimeout(function(){openModal('login');},100); return; }
    navigate('messages.html');
  };
}

/* ── SAVE ── */
function toggleSave(id) {
  if (savedIds.has(id)) savedIds.delete(id); else savedIds.add(id);
  localStorage.setItem('b_saved', JSON.stringify(Array.from(savedIds)));
  document.querySelectorAll('.card-heart[data-id="' + id + '"]').forEach(function(h) {
    h.classList.toggle('on', savedIds.has(id));
  });
}

/* ── BUILD CARD ── */
function buildCard(l, i) {
  var sv = savedIds.has(l.id);
  var isNew = new Date(l.created_at) > new Date(Date.now() - 86400000);
  var card = document.createElement('div');
  card.className = 'card';
  var imgDiv = document.createElement('div');
  imgDiv.className = 'card-img';
  var grad = document.createElement('div');
  grad.className = 'card-grad';
  grad.style.background = GRADS[i % GRADS.length];
  imgDiv.appendChild(grad);
  var ov = document.createElement('div');
  ov.className = 'card-overlay';
  imgDiv.appendChild(ov);
  var src = document.createElement('div');
  src.className = 'card-src';
  src.textContent = l.source;
  imgDiv.appendChild(src);
  var heart = document.createElement('div');
  heart.className = 'card-heart' + (sv ? ' on' : '');
  heart.setAttribute('data-id', l.id);
  heart.innerHTML = '<svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>';
  heart.addEventListener('click', function(e) {
    e.stopPropagation();
    toggleSave(l.id);
    heart.classList.toggle('on', savedIds.has(l.id));
  });
  imgDiv.appendChild(heart);
  var price = document.createElement('div');
  price.className = 'card-price';
  price.innerHTML = '&#8362;' + Number(l.price).toLocaleString() + '<span>/ mo</span>';
  imgDiv.appendChild(price);
  if (isNew) {
    var nb = document.createElement('div');
    nb.className = 'card-new'; nb.textContent = 'New';
    imgDiv.appendChild(nb);
  }
  card.appendChild(imgDiv);
  var body = document.createElement('div');
  body.className = 'card-body';
  body.innerHTML = '<p class="card-hood">' + l.neighborhood + '</p>' +
    '<p class="card-title">' + l.title + '</p>' +
    '<div class="card-details"><span>' + l.rooms + ' rooms</span>' +
    (l.sqm ? '<span>' + l.sqm + ' m&#178;</span>' : '') +
    (l.floor ? '<span>Floor ' + l.floor + '</span>' : '') + '</div>';
  card.appendChild(body);
  card.addEventListener('click', function() { openModal('detail', l, i); });
  return card;
}

var FALLBACK = [
  {id:'f1',neighborhood:'Neve Tzedek',title:'Bright 3-room with terrace',rooms:3,sqm:78,floor:2,price:9500,source:'Baita',url:'#',created_at:new Date(),description:'Stunning apartment with high ceilings and sunny terrace.'},
  {id:'f2',neighborhood:'Florentin',title:'Renovated 2-room',rooms:2,sqm:52,floor:3,price:5900,source:'Baita',url:'#',created_at:new Date(),description:'Charming renovated apartment close to cafes and galleries.'},
  {id:'f3',neighborhood:'Rothschild',title:'Penthouse studio',rooms:1,sqm:38,floor:8,price:7200,source:'Baita',url:'#',created_at:new Date(),description:'Top floor studio with panoramic city views.'},
  {id:'f4',neighborhood:'Gordon',title:'4-room near the beach',rooms:4,sqm:105,floor:4,price:13500,source:'Baita',url:'#',created_at:new Date(),description:'Spacious family apartment 200m from Gordon Beach.'},
  {id:'f5',neighborhood:'Kerem HaTeimanim',title:'Authentic 2-room',rooms:2,sqm:60,floor:1,price:6400,source:'Baita',url:'#',created_at:new Date(),description:'Authentic Tel Aviv apartment with yard access.'},
  {id:'f6',neighborhood:'Lev Tel Aviv',title:'Modern 3-room furnished',rooms:3,sqm:88,floor:5,price:11200,source:'Baita',url:'#',created_at:new Date(),description:'Fully furnished modern apartment. Available immediately.'},
];

function renderCards(list, reset) {
  var g = document.getElementById('grid');
  if (reset) g.innerHTML = '';
  if (!list || !list.length) {
    if (reset) g.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:60px;color:var(--text-muted);font-family:Cormorant Garamond,serif;font-size:22px;font-weight:300">No listings found</div>';
    return;
  }
  var startIdx = reset ? 0 : offset - list.length;
  list.forEach(function(l, i) { g.appendChild(buildCard(l, startIdx + i)); });
  document.getElementById('grid-count').textContent = (offset) + ' listings';
}

function doSearch(reset) {
  if (reset === undefined) reset = true;
  if (reset) offset = 0;
  var hood = document.getElementById('s-hood').value;
  var price = document.getElementById('s-price').value;
  var rooms = document.getElementById('s-rooms').value || (curFilter !== 'new' ? curFilter : null);
  var url = API + '/listings?limit=12&offset=' + offset + '&sort=' + curSort;
  if (hood) url += '&neighborhood=' + encodeURIComponent(hood);
  if (price) url += '&max_price=' + price;
  if (rooms) url += '&rooms=' + rooms;
  if (newOnly) url += '&new_today=true';
  fetch(url)
    .then(function(r) { return r.json(); })
    .then(function(d) {
      renderCards(d.listings, reset);
      offset += (d.listings || []).length;
      document.getElementById('grid-count').textContent = offset + ' of ' + Number(d.total).toLocaleString() + ' listings';
    })
    .catch(function() { renderCards(FALLBACK, true); offset = FALLBACK.length; });
}

function setFilter(btn, f) {
  document.querySelectorAll('.fb').forEach(function(b) { b.classList.remove('on'); });
  btn.classList.add('on');
  curFilter = f;
  newOnly = f === 'new';
  doSearch(true);
}

/* ── PROFILE ── */
function buildNbhd() {
  var wrap = document.getElementById('pm-nbhd');
  wrap.innerHTML = '';
  NBHD.forEach(function(n) {
    var c = document.createElement('div');
    c.className = 'nc' + (userChips.indexOf(n) >= 0 ? ' on' : '');
    c.textContent = n;
    c.addEventListener('click', function() {
      c.classList.toggle('on');
      if (c.classList.contains('on')) userChips.push(n);
      else userChips = userChips.filter(function(x) { return x !== n; });
    });
    wrap.appendChild(c);
  });
}

function fillProfile(u) {
  myData = u;
  var badge = u.role === 'host' ? HOST_SVG : SEEKER_SVG;
  document.getElementById('pm-role').textContent = u.role === 'host' ? 'Baita Host' : 'Baita Seeker';
  document.getElementById('pm-name').textContent = u.full_name || '';
  document.getElementById('pm-email').textContent = u.email || '';
  document.getElementById('pm-badge').innerHTML = badge;
  document.getElementById('pm-name-in').value = u.full_name || '';
  document.getElementById('pm-wa').value = u.whatsapp || '';
  document.getElementById('pm-email-in').value = u.email || '';
  document.getElementById('pm-age').value = u.age || '';
  document.getElementById('pm-nbhd-title').textContent = u.role === 'host' ? 'My neighborhoods' : "I'm looking in";
  if (u.avatar_url) {
    var img = document.getElementById('pm-av-img');
    img.src = u.avatar_url; img.style.display = 'block';
    document.getElementById('pm-av-inner').style.display = 'none';
    var navAv = document.getElementById('nav-av');
    navAv.innerHTML = '<img src="' + u.avatar_url + '" style="width:100%;height:100%;object-fit:cover;border-radius:50%">';
  } else {
    document.getElementById('pm-av-inner').innerHTML = badge;
    document.getElementById('nav-av').innerHTML = badge;
  }
  if (u.neighborhoods) userChips = u.neighborhoods.split(',').filter(Boolean);
  buildNbhd();
  // Update nav
  document.getElementById('nav-user').style.display = 'flex';
  document.getElementById('nav-signin').style.display = 'none';
  document.getElementById('nav-uname').textContent = (u.full_name || '').split(' ')[0];
  // Hide Join Baita, show Sign out
  var joinBtn = document.getElementById('nav-join');
  if (joinBtn) joinBtn.style.display = 'none';
  var signoutBtn = document.getElementById('nav-signout');
  if (signoutBtn) signoutBtn.style.display = 'inline-block';
}

document.getElementById('pm-av-upload').addEventListener('change', function() {
  var file = this.files[0]; if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    var img = document.getElementById('pm-av-img');
    img.src = e.target.result; img.style.display = 'block';
    document.getElementById('pm-av-inner').style.display = 'none';
    var navAv = document.getElementById('nav-av');
    navAv.innerHTML = '<img src="' + e.target.result + '" style="width:100%;height:100%;object-fit:cover;border-radius:50%">';
    fetch(API + '/users/me', {method:'PUT',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify({avatar_url:e.target.result})}).catch(function(){});
  };
  reader.readAsDataURL(file);
});

document.getElementById('pm-save').addEventListener('click', function() {
  fetch(API + '/users/me', {
    method:'PUT', headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},
    body:JSON.stringify({full_name:document.getElementById('pm-name-in').value.trim(), whatsapp:document.getElementById('pm-wa').value.trim(), age:parseInt(document.getElementById('pm-age').value)||0, neighborhoods:userChips})
  }).then(function(r) { return r.json(); })
  .then(function(d) {
    if (d.success) {
      document.getElementById('pm-name').textContent = document.getElementById('pm-name-in').value.trim();
      document.getElementById('nav-uname').textContent = document.getElementById('pm-name-in').value.trim().split(' ')[0];
      var ok = document.getElementById('pm-ok'); ok.style.display = 'inline-block';
      setTimeout(function() { ok.style.display = 'none'; }, 2000);
    }
  }).catch(function(){});
});

function doSignOut() {
  localStorage.removeItem('baita_token');
  navigate('/');
}
document.getElementById('pm-signout').addEventListener('click', function() {
  localStorage.removeItem('baita_token'); navigate('/');
});

/* ── LOGIN ── */
document.getElementById('lm-btn').addEventListener('click', doLogin);
document.getElementById('l-email').addEventListener('keydown', function(e) { if(e.key==='Enter') doLogin(); });
document.getElementById('l-pwd').addEventListener('keydown', function(e) { if(e.key==='Enter') doLogin(); });

function doLogin() {
  var email = document.getElementById('l-email').value.trim();
  var pwd = document.getElementById('l-pwd').value;
  fetch(API + '/users/login', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:email,password:pwd})})
    .then(function(r) { return r.json(); })
    .then(function(d) {
      if (d.success && d.token) {
        token = d.token; localStorage.setItem('baita_token', token);
        fillProfile(d.user); closeModal();
      } else { document.getElementById('lm-err').style.display = 'block'; }
    }).catch(function() { document.getElementById('lm-err').style.display = 'block'; });
}

/* ── INIT ── */
document.getElementById('s-hood').addEventListener('keydown', function(e) { if(e.key==='Enter') doSearch(true); });

if (token) {
  fetch(API + '/users/me', {headers:{'Authorization':'Bearer '+token}})
    .then(function(r) { return r.json(); })
    .then(function(d) { if (d.user) fillProfile(d.user); })
    .catch(function(){});
}

doSearch(true);
</script>
</body>
</html>
